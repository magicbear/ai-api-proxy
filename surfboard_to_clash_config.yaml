# General Settings
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

# Tun Settings
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 192.168.8.0/24
    - 192.168.10.0/24

# DNSS Settings
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
  nameserver:
    - 114.114.114.114
    - 8.8.8.8
  fallback:
    - 8.8.8.8
    - 8.8.4.4
  fallback-filter:
    geosite: cn
    ipcidr:
      - 240.0.0.0/4
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"

# Proxies
proxies:
  - name: "ypss-dns"
    type: "shadowsocks"
    server: "ypss.bilibili.co"
    port: 442
    cipher: "aes-256-cfb"
    password: "pfuWStczeQ2Kmwk"
    plugin: "obfs"
    plugin-opts:
      mode: "tls"
      host: "example.com"

  - name: "ss-hk"
