# Proxy Groups
proxy-groups:
  - name: "Proxy"
    type: "select"
    proxies:
      - "ypss-dns"
      - "ss-dj"
      - "ss-dj-tel"
      - "ss-hk"
      - "DIRECT"

  - name: "Proxy-dj"
    type: "select"
    proxies:
      - "Proxy"
      - "ss-dj"
      - "ss-dj-tel"
      - "ss-hk"
      - "DIRECT"

  - name: "Proxy-nng"
    type: "select"
    proxies:
      - "nng"
      - "tun-nng"
      - "Proxy"
      - "DIRECT"

  - name: "Proxy-ns"
    type: "select"
    proxies:
      - "tun-ns"
      - "Proxy"
      - "DIRECT"

  - name: "Proxy-home"
    type: "select"
    proxies:
      - "Proxy"
      - "home"
      - "DIRECT"

  - name: "Proxy-jp"
    type: "select"
    proxies:
      - "ss-dj-jp"
      - "tun-jp"
      - "jp"
